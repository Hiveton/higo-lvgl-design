services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lvgl_editor
      POSTGRES_USER: lvgl
      POSTGRES_PASSWORD: lvgl
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lvgl
      MINIO_ROOT_PASSWORD: lvgl-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
